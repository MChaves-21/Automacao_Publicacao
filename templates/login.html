<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login — Marketing Automation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07090d; --surface: #0e1219; --border: #1d2738; --border2: #263347;
    --text: #d8e2f0; --text2: #7a90ab; --text3: #4a607a;
    --amber: #f0a020; --amber-dim: rgba(240,160,32,.12); --amber-glow: rgba(240,160,32,.3);
    --red: #f05060; --red-dim: rgba(240,80,96,.12);
    --green: #22d47a;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Grid de fundo decorativo */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity: .35;
    pointer-events: none;
  }

  /* Glow central */
  body::after {
    content: '';
    position: fixed;
    width: 500px; height: 500px;
    background: radial-gradient(circle, var(--amber-dim) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 16px;
    padding: 44px 40px;
    width: 380px;
    position: relative;
    z-index: 1;
    box-shadow: 0 24px 60px rgba(0,0,0,.5);
    animation: slidein .35s cubic-bezier(.16,1,.3,1);
  }

  @keyframes slidein {
    from { opacity: 0; transform: translateY(20px) scale(.97); }
    to   { opacity: 1; transform: none; }
  }

  .logo {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 32px;
  }
  .logo-icon {
    width: 40px; height: 40px;
    background: var(--amber);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    box-shadow: 0 0 20px var(--amber-glow);
  }
  .logo-text h1 {
    font-family: 'Syne', sans-serif;
    font-size: 15px; font-weight: 800;
    color: var(--text); letter-spacing: -0.01em;
  }
  .logo-text p { font-size: 10px; color: var(--text3); margin-top: 2px; }

  .form-title {
    font-family: 'Syne', sans-serif;
    font-size: 20px; font-weight: 800;
    color: var(--text); margin-bottom: 6px;
  }
  .form-sub { font-size: 11px; color: var(--text3); margin-bottom: 28px; }

  .field { margin-bottom: 16px; }
  .field label {
    display: block; font-size: 10px; color: var(--text2);
    text-transform: uppercase; letter-spacing: .07em; margin-bottom: 7px;
  }
  .field input {
    width: 100%;
    background: #0a0e14;
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 11px 14px;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  .field input:focus {
    border-color: var(--amber);
    box-shadow: 0 0 0 3px var(--amber-dim);
  }
  .field input::placeholder { color: var(--text3); }

  .error-box {
    background: var(--red-dim);
    border: 1px solid rgba(240,80,96,.25);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 11px;
    color: var(--red);
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 8px;
  }

  .btn-login {
    width: 100%;
    background: var(--amber);
    color: #07090d;
    border: none;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-size: 13px; font-weight: 700;
    padding: 12px;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: all .15s;
    margin-top: 8px;
  }
  .btn-login:hover {
    background: #f5b030;
    box-shadow: 0 4px 20px var(--amber-glow);
    transform: translateY(-1px);
  }
  .btn-login:active { transform: none; }

  .footer-note {
    text-align: center;
    margin-top: 24px;
    font-size: 10px;
    color: var(--text3);
  }
  .dot-green {
    display: inline-block; width: 6px; height: 6px;
    background: var(--green); border-radius: 50;
    margin-right: 4px; vertical-align: middle;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">📣</div>
    <div class="logo-text">
      <h1>MktAutomation</h1>
      <p>Powered by Gemini Flash</p>
    </div>
  </div>

  <div class="form-title">Entrar</div>
  <div class="form-sub">Acesso restrito à equipe de marketing</div>

  {% if error %}
  <div class="error-box">⚠️ {{ error }}</div>
  {% endif %}

  <form method="POST" action="/login">
    <div class="field">
      <label>Usuário</label>
      <input type="text" name="identifier" placeholder="usuário ou e-mail" autocomplete="username" required autofocus>
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn-login">Entrar no painel →</button>
  </form>

  <div class="footer-note">
    <span class="dot-green"></span>
    Gemini Flash · Gratuito · 1.500 req/dia
  </div>
<div style="text-align:center;margin-top:14px;font-size:11px;color:var(--text3)">Não tem conta? <a href="/register" style="color:var(--amber);text-decoration:none">Criar conta</a></div>
</div>
</body>
</html>
