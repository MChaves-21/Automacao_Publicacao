<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Login — MktAutomation</title>
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#e8a920">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#060a12;--s1:#080d16;--s2:#0c1420;--b1:#182438;--b2:#1e2f48;--t1:#ddeeff;--t2:#5d80a8;--t3:#2e4a6a;--gold:#e8a920;--gd:rgba(232,169,32,.08);--gg:rgba(232,169,32,.2);--red:#f04f5e;--rdd:rgba(240,79,94,.1)}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--b1) 1px,transparent 1px),linear-gradient(90deg,var(--b1) 1px,transparent 1px);background-size:52px 52px;opacity:.4;pointer-events:none}
  body::after{content:'';position:fixed;width:600px;height:600px;background:radial-gradient(circle,var(--gd) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
  .card{background:var(--s1);border:1px solid var(--b2);border-radius:20px;padding:44px 40px;width:400px;position:relative;z-index:1;box-shadow:0 32px 80px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.03);animation:up .35s cubic-bezier(.16,1,.3,1)}
  @keyframes up{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
  .logo{display:flex;align-items:center;gap:12px;margin-bottom:32px}
  .logo-icon{width:42px;height:42px;background:linear-gradient(135deg,var(--gold),#f59e0b);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 24px var(--gg),0 4px 12px rgba(0,0,0,.4)}
  .logo-text h1{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--t1);letter-spacing:-.01em}
  .logo-text p{font-size:10px;color:var(--t3);margin-top:2px;letter-spacing:.04em}
  h2{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--t1);letter-spacing:-.02em;margin-bottom:6px}
  .sub{font-size:12px;color:var(--t3);margin-bottom:28px}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}
  .field input{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:10px;color:var(--t1);font-family:'Inter',sans-serif;font-size:13px;padding:11px 14px;outline:none;transition:border-color .15s,box-shadow .15s}
  .field input:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gd)}
  .field input::placeholder{color:var(--t3)}
  .error{background:var(--rdd);border:1px solid rgba(240,79,94,.25);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--red);margin-bottom:18px;display:flex;align-items:center;gap:8px}
  .btn-login{width:100%;background:linear-gradient(135deg,var(--gold),#f59e0b);color:#06090f;border:none;border-radius:10px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;padding:13px;cursor:pointer;transition:all .15s;margin-top:6px;letter-spacing:-.01em}
  .btn-login:hover{filter:brightness(1.08);box-shadow:0 6px 24px var(--gg);transform:translateY(-1px)}
  .footer{text-align:center;margin-top:24px;font-size:11px;color:var(--t3)}
  .footer a{color:var(--gold);text-decoration:none;font-weight:500}
  .footer a:hover{text-decoration:underline}
  .status{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:16px;font-size:10px;font-weight:500;color:var(--t3)}
  .dot{width:6px;height:6px;background:#0fba74;border-radius:50%;animation:p 2s infinite}
  @keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">📣</div>
    <div class="logo-text">
      <h1>MktAutomation</h1>
      <p>Marketing Automation System</p>
    </div>
  </div>
  <h2>Entrar</h2>
  <p class="sub">Acesso restrito à equipe de marketing</p>
  {% if error %}<div class="error">⚠ {{ error }}</div>{% endif %}
  <form method="POST" action="/login">
    <div class="field"><label>Usuário ou e-mail</label><input type="text" name="identifier" placeholder="seu@email.com" autocomplete="username" required autofocus></div>
    <div class="field"><label>Senha</label><input type="password" name="password" placeholder="••••••••" autocomplete="current-password" required></div>
    <button type="submit" class="btn-login">Entrar no painel →</button>
  </form>
  <div class="footer">Não tem conta? <a href="/register">Criar conta</a></div>
  <div class="status"><div class="dot"></div>Gemini Flash · Gratuito · 1.500 req/dia</div>
</div>
</body>
</html>
