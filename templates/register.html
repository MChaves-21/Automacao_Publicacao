<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cadastro — Marketing Automation</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#07090d;--surface:#0e1219;--border:#1d2738;--border2:#263347;--text:#d8e2f0;--text2:#7a90ab;--text3:#4a607a;--amber:#f0a020;--amber-dim:rgba(240,160,32,.12);--amber-glow:rgba(240,160,32,.3);--red:#f05060;--red-dim:rgba(240,80,96,.12);--green:#22d47a}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:48px 48px;opacity:.35;pointer-events:none}
  body::after{content:'';position:fixed;width:500px;height:500px;background:radial-gradient(circle,var(--amber-dim) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
  .card{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:40px;width:400px;position:relative;z-index:1;box-shadow:0 24px 60px rgba(0,0,0,.5);animation:slidein .35s cubic-bezier(.16,1,.3,1)}
  @keyframes slidein{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:none}}
  .logo{display:flex;align-items:center;gap:12px;margin-bottom:28px}
  .logo-icon{width:40px;height:40px;background:var(--amber);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 20px var(--amber-glow)}
  .logo-text h1{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:var(--text)}
  .logo-text p{font-size:10px;color:var(--text3);margin-top:2px}
  .form-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:4px}
  .form-sub{font-size:11px;color:var(--text3);margin-bottom:24px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
  .field input{width:100%;background:#0a0e14;border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;padding:10px 14px;outline:none;transition:border-color .15s,box-shadow .15s}
  .field input:focus{border-color:var(--amber);box-shadow:0 0 0 3px var(--amber-dim)}
  .field input::placeholder{color:var(--text3)}
  .error-box{background:var(--red-dim);border:1px solid rgba(240,80,96,.25);border-radius:8px;padding:10px 14px;font-size:11px;color:var(--red);margin-bottom:16px;display:flex;align-items:center;gap:8px}
  .btn-submit{width:100%;background:var(--amber);color:#07090d;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;padding:12px;cursor:pointer;transition:all .15s;margin-top:4px}
  .btn-submit:hover{background:#f5b030;box-shadow:0 4px 20px var(--amber-glow);transform:translateY(-1px)}
  .footer-note{text-align:center;margin-top:20px;font-size:11px;color:var(--text3)}
  .footer-note a{color:var(--amber);text-decoration:none}
  .footer-note a:hover{text-decoration:underline}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">📣</div>
    <div class="logo-text">
      <h1>MktAutomation</h1>
      <p>Powered by Gemini Flash</p>
    </div>
  </div>

  <div class="form-title">Criar conta</div>
  <div class="form-sub">Junte-se ao time de marketing</div>

  {% if error %}
  <div class="error-box">⚠️ {{ error }}</div>
  {% endif %}

  <form method="POST" action="/register">
    <div class="grid">
      <div class="field">
        <label>Usuário</label>
        <input type="text" name="username" placeholder="seunome" required minlength="3" autocomplete="username" autofocus>
      </div>
      <div class="field">
        <label>E-mail</label>
        <input type="email" name="email" placeholder="seu@email.com" required autocomplete="email">
      </div>
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" name="password" placeholder="mínimo 6 caracteres" required minlength="6" autocomplete="new-password">
    </div>
    <div class="field">
      <label>Confirmar senha</label>
      <input type="password" name="password2" placeholder="repita a senha" required autocomplete="new-password">
    </div>
    <button type="submit" class="btn-submit">Criar conta →</button>
  </form>

  <div class="footer-note">
    Já tem conta? <a href="/login">Entrar</a>
  </div>
</div>
</body>
</html>
