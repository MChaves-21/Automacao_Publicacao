<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Verificação 2FA — MktAutomation</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#060a12;--s1:#080d16;--s2:#0c1420;--b1:#182438;--b2:#1e2f48;--t1:#ddeeff;--t2:#5d80a8;--t3:#2e4a6a;--gold:#e8a920;--gd:rgba(232,169,32,.08);--gg:rgba(232,169,32,.2);--red:#f04f5e;--rdd:rgba(240,79,94,.1)}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;display:flex;align-items:center;justify-content:center}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--b1) 1px,transparent 1px),linear-gradient(90deg,var(--b1) 1px,transparent 1px);background-size:52px 52px;opacity:.4;pointer-events:none}
  .card{background:var(--s1);border:1px solid var(--b2);border-radius:20px;padding:44px 40px;width:400px;position:relative;z-index:1;box-shadow:0 32px 80px rgba(0,0,0,.6)}
  .logo{display:flex;align-items:center;gap:12px;margin-bottom:28px}
  .logo-icon{width:42px;height:42px;background:linear-gradient(135deg,var(--gold),#f59e0b);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 24px var(--gg)}
  .logo-text h1{font-family:'Syne',sans-serif;font-size:16px;font-weight:800}
  .logo-text p{font-size:10px;color:var(--t3);margin-top:2px}
  h2{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:6px}
  .sub{font-size:12px;color:var(--t3);margin-bottom:28px;line-height:1.6}
  .error{background:var(--rdd);border:1px solid rgba(240,79,94,.25);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--red);margin-bottom:18px}
  .otp-wrap{display:flex;gap:8px;justify-content:center;margin-bottom:24px}
  .otp-wrap input{width:46px;height:56px;background:var(--s2);border:1px solid var(--b2);border-radius:10px;color:var(--t1);font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:500;text-align:center;outline:none;transition:border-color .15s,box-shadow .15s}
  .otp-wrap input:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gd)}
  .btn{width:100%;background:linear-gradient(135deg,var(--gold),#f59e0b);color:#06090f;border:none;border-radius:10px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;padding:13px;cursor:pointer;transition:all .15s}
  .btn:hover{filter:brightness(1.08);box-shadow:0 6px 24px var(--gg);transform:translateY(-1px)}
  .back{text-align:center;margin-top:18px;font-size:11px;color:var(--t3)}
  .back a{color:var(--gold);text-decoration:none;font-weight:500}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">📣</div>
    <div class="logo-text"><h1>MktAutomation</h1><p>Verificação em duas etapas</p></div>
  </div>
  <h2>Código de verificação</h2>
  <p class="sub">Abra o Google Authenticator ou Authy e insira o código de 6 dígitos.</p>
  {% if error %}<div class="error">⚠ {{ error }}</div>{% endif %}
  <form method="POST" id="form">
    <input type="hidden" name="token" id="token-hidden">
    <div class="otp-wrap" id="otp-wrap">
      <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autofocus>
      <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
      <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
      <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
      <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
      <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
    </div>
    <button type="submit" class="btn">Verificar →</button>
  </form>
  <div class="back"><a href="/logout">← Voltar ao login</a></div>
</div>
<script>
const inputs = document.querySelectorAll('#otp-wrap input');
inputs.forEach((inp,i)=>{
  inp.addEventListener('input',e=>{
    if(inp.value&&i<inputs.length-1)inputs[i+1].focus();
    document.getElementById('token-hidden').value=[...inputs].map(x=>x.value).join('');
  });
  inp.addEventListener('keydown',e=>{if(e.key==='Backspace'&&!inp.value&&i>0)inputs[i-1].focus()});
});
</script>
</body>
</html>
